<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว - ณพัชชาภรณ์ ชัยยศ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #6C5CE7; /* สีม่วงหลักสไตล์โมเดิร์น */
            --primary-light: #A29BFE;
            --dark-color: #2D3436;
            --light-bg: #F9F9FB;
            --card-bg: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--light-bg);
            color: var(--dark-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .profile-container:hover {
            transform: translateY(-5px);
        }

        /* Header ส่วนหัวโทนสีม่วง ไล่เฉดสี */
        .profile-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            padding: 40px 20px;
            text-align: center;
            color: white;
            position: relative;
        }

        .avatar-container {
            width: 110px;
            height: 110px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .avatar-container i {
            font-size: 3.5rem;
            color: var(--primary-color);
        }

        .profile-header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .profile-header p {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        /* Body รายละเอียดประวัติ */
        .profile-body {
            padding: 30px 25px;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #EEF2F5;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background-color: rgba(108, 92, 231, 0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            transition: all 0.3s ease;
        }

        .info-item:hover .icon-box {
            background-color: var(--primary-color);
        }

        .info-item:hover .icon-box i {
            color: white;
        }

        .icon-box i {
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .info-content .label {
            font-size: 0.85rem;
            color: #888;
            display: block;
            margin-bottom: 2px;
        }

        .info-content .value {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--dark-color);
        }

        /* ตกแต่งแท็กสีพิเศษสำหรับกะเพราหมูกรอบและสีม่วง */
        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .badge-food {
            background-color: #FFEAA7;
            color: #D63031;
        }

        .badge-color {
            background-color: #E0DBFF;
            color: #6C5CE7;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-header">
            <div class="avatar-container">
                <i class="fa-solid fa-user-astronaut"></i>
            </div>
            <h1>ณพัชชาภรณ์ ชัยยศ</h1>
            <p>ชื่อเล่น: ซีซ่าร์</p>
        </div>

        <div class="profile-body">
            
            <div class="info-item">
                <div class="icon-box">
                    <i class="fa-solid fa-cake-candles"></i>
                </div>
                <div class="info-content">
                    <span class="label">วันเกิด</span>
                    <span class="value">9 กันยายน 2554</span>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-box">
                    <i class="fa-solid fa-utensils"></i>
                </div>
                <div class="info-content">
                    <span class="label">อาหารที่ชอบ</span>
                    <span class="value badge badge-food">
                        <i class="fa-solid fa-fire-flame-curved" style="margin-right: 4px;"></i> กะเพราหมูกรอบ
                    </span>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-box">
                    <i class="fa-solid fa-palette"></i>
                </div>
                <div class="info-content">
                    <span class="label">สีที่ชอบ</span>
                    <span class="value badge badge-color">
                        <i class="fa-solid fa-heart" style="margin-right: 4px;"></i> สีม่วง
                    </span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
